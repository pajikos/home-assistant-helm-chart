{{- if and .Values.configuration.enabled (eq .Values.configuration.existingConfigMap "") -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: hass-configuration
  namespace: {{ include "home-assistant.namespace" . }}
data:
  configuration.yaml: |
    {{- tpl .Values.configuration.templateConfig . | nindent 4 }}
{{- end -}}